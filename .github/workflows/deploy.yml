name: Deploy EpicBook

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: SSH Deploy to Azure VM
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 102.37.143.238
        username: azureuser
        key: ${{ secrets.AZURE_VM_KEY }}
        script: |
          cd theepicbook-docker
          git pull
          docker compose down
          docker compose up -d --build
