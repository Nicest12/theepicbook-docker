version: "3.8"

services:

  nginx:
    image: nginx:latest
    container_name: epicbook-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./logs:/var/log/nginx
    depends_on:
      - epicbook
    networks:
      - epicbook-network

  mysql:
    image: mysql:8
    container_name: epicbook-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: demo1234
      MYSQL_DATABASE: bookstore
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - epicbook-network

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -pdemo1234 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  epicbook:
    build: .
    container_name: epicbook-app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: demo1234
      DB_NAME: bookstore
      PORT: 3000
    networks:
      - epicbook-network

networks:
  epicbook-network:

volumes:
  db_data:
